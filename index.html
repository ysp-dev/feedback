<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Feedback Reply</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="ptr-indicator" class="ptr-indicator">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
    <path d="M3 3v5h5"/>
  </svg>
</div>
<div class="wrap">

<header class="app-header">
    <h1 class="app-title">Feedback Reply</h1>
    <p class="app-sub">문서 촬영 · OCR · 전문 답변 자동 생성</p>
    <button class="refresh-btn" onclick="resetAll()" title="초기화">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </button>
  </header>

  <!-- API Key -->
  <section class="section">
    <div class="api-header" onclick="toggleApiSection()">
      <svg class="key-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="7.5" cy="15.5" r="5.5"/>
        <path d="m21 2-9.6 9.6M15.5 7.5l2 2"/>
      </svg>
      <span class="section-label">Gemini API Key</span>
      <span id="key-status" class="status-text api-status"></span>
      <span id="api-chevron" class="api-chevron">−</span>
    </div>
    <div id="api-input-wrap">
      <div class="api-row">
        <input id="api-key-input" type="password" class="input" placeholder="AIzaSy..." />
        <button class="btn btn-ghost" onclick="saveKey()">저장</button>
        <button class="btn-text" onclick="toggleKey()">표시/숨김</button>
      </div>
    </div>
  </section>

  <hr class="divider" />

  <!-- Step 1 -->
  <section class="section">
    <div class="step-header">
      <span class="step-num">01</span>
      <span class="step-title">문서 촬영 / 업로드</span>
    </div>
    <div class="upload-row">
      <label class="btn btn-outline">
        카메라 촬영
        <input id="camera-input" type="file" accept="image/*" capture="environment" style="display:none" />
      </label>
      <label class="btn btn-ghost">
        파일 선택
        <input id="file-input" type="file" accept="image/*" style="display:none" />
      </label>
    </div>
    <div>
      <img id="preview-img" alt="" />
    </div>
    <button id="ocr-btn" class="btn btn-solid w-full" disabled onclick="runOcr()">
      <span id="ocr-spinner" class="spinner d-none"></span>
      <span class="ocr-label">OCR 분석</span>
    </button>
  </section>

  <hr class="divider" />

  <!-- Step 2 -->
  <section class="section">
    <div class="step-header">
      <span class="step-num">02</span>
      <span class="step-title">추출된 텍스트 <span class="muted">— 수정 가능</span></span>
    </div>
    <textarea id="ocr-text" class="textarea" rows="8"
      placeholder="OCR 결과가 여기에 표시됩니다."></textarea>
    <div id="ocr-error" class="error-msg d-none"></div>

    <!-- Classification -->
    <div class="classify-section">
      <div class="classify-group">
        <span class="classify-label">방향</span>
        <div class="classify-chips">
          <button class="chip chip-dir" data-value="Top-down" onclick="selectChip(this,'direction')">Top-down ↓<span class="chip-sub">부서장 → 팀원</span></button>
          <button class="chip chip-dir" data-value="Bottom-up" onclick="selectChip(this,'direction')">Bottom-up ↑<span class="chip-sub">부서장 → 경영진</span></button>
        </div>
      </div>
      <div class="classify-group d-none" id="type-group">
        <span class="classify-label">유형</span>
        <div class="classify-chips" id="type-chips"></div>
        <div id="type-desc" class="classify-desc"></div>
      </div>
      <div class="classify-group d-none" id="subtype-group">
        <span class="classify-label">세부 유형</span>
        <div class="classify-chips" id="subtype-chips"></div>
      </div>
      <div class="classify-row">
        <div class="classify-group">
          <span class="classify-label">강도</span>
          <div class="classify-chips">
            <button class="chip" data-value="라이트" onclick="selectChip(this,'intensity')">라이트</button>
            <button class="chip" data-value="정식" onclick="selectChip(this,'intensity')">정식</button>
          </div>
        </div>
        <div class="classify-group">
          <span class="classify-label">시점</span>
          <div class="classify-chips">
            <button class="chip" data-value="즉시" onclick="selectChip(this,'timing')">즉시</button>
            <button class="chip" data-value="정기" onclick="selectChip(this,'timing')">정기</button>
            <button class="chip" data-value="공식" onclick="selectChip(this,'timing')">공식</button>
          </div>
        </div>
      </div>
    </div>

    <button id="reply-btn" class="btn btn-solid w-full" disabled onclick="runReply()">
      <span id="reply-spinner" class="spinner d-none"></span>
      <span class="reply-label">답변 생성</span>
    </button>
  </section>

  <hr class="divider" />

  <!-- Step 3 -->
  <section class="section">
    <div class="step-header">
      <span class="step-num">03</span>
      <span class="step-title">생성된 답변</span>
    </div>
    <textarea id="reply-text" class="textarea" rows="10"
      placeholder="생성된 답변이 여기에 표시됩니다."></textarea>
    <div id="reply-error" class="error-msg d-none"></div>
    <button id="copy-btn" class="btn btn-outline w-full" onclick="copyReply()">
      클립보드 복사
    </button>
  </section>

</div>
<!-- Crop Modal -->
<div id="crop-modal" class="crop-modal d-none">
  <div class="crop-header">
    <span>이미지 크롭</span>
    <div class="crop-rotate">
      <button class="btn-text" onclick="rotateCrop(-90)">↺ 좌회전</button>
      <button class="btn-text" onclick="rotateCrop(90)">↻ 우회전</button>
    </div>
  </div>
  <div class="crop-container">
    <img id="crop-img" alt="" />
  </div>
  <div class="crop-actions">
    <button class="btn btn-ghost" onclick="cancelCrop()">취소</button>
    <button class="btn btn-solid" onclick="applyCrop()">적용</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>
<script src="app.js?v=3"></script>
</body>
</html>
